# Pomiar pogarszania jakości tekstu przy rosnącym threshold.
# Działa na małych modelach (TinyLlama) — w przeciwieństwie do HumanEval.

[run]
tests = ["quality_sweep"]

[model]
key = "tinyllama"

[stego]
top_n = 15
thresholds = [0.0, 0.001, 0.01, 0.05, 0.1, 0.3]
seed = 42

[quality_sweep]
prompts = [
    "My favorite programming language is",
    "The capital of France is",
    "In machine learning, gradient descent is",
    "Once upon a time in a small village",
]
max_new_tokens = 48

[output]
results_dir = "results"
